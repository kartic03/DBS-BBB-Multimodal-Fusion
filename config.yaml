paths:
  data_raw: "data/raw/"
  data_processed: "data/processed/"
  results: "results/"
  checkpoints: "results/checkpoints/"
  figures: "results/figures/"

lfp:
  sampling_rate: 1000
  epoch_length_sec: 2.0
  overlap: 0.5
  bandpass: [1, 200]
  notch: 50
  beta_band: [13, 30]

model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  dropout: 0.1
  batch_size: 32
  epochs: 100
  lr: 1.0e-4
  weight_decay: 1.0e-2
  patience: 15
  seed: 42
  device: "cuda"

bbb:
  n_features: 20
  embedding_dim: 64
  impute_k: 5

groq:
  api_key: "YOUR_GROQ_API_KEY"  # Get free key at https://console.groq.com
  model: "llama-3.3-70b-versatile"
  fallback_model: "qwen-qwq-32b"
  max_tokens: 200
  temperature: 0.3

training:
  n_folds: 5
  test_size: 0.15
  val_size: 0.15
  smote: true
  bootstrap_n: 1000

figures:
  dpi: 300
  format: "png"
  font_family: "Arial"
  font_size: 10
